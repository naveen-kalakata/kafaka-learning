spring.application.name=kafka-learning
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
auth.jwt.secret=change-this-secret-key-to-a-long-value-1234567890
auth.jwt.expiration-minutes=60
auth.jwt.refresh-expiration-minutes=10080
logging.level.root=INFO
logging.level.com.example.kafkalearning=INFO
